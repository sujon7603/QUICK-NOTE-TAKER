<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sujon Quick Note Taker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Quick Note Taker</h1>
    <br>
    <p id="save_status" style="font-size: 14px; color: #666;">Auto save status</p>

    <textarea name="" id="note" placeholder="start typing your note"></textarea>
    <br><br>
    <button id="new-note">New Note</button>
    <button id="open-file">Open File</button>
    <button id="save">Save Note</button>
    <button id="save-as">Save As</button>
    <div id="save_status" style="margin-top:10px; color:#666; font-size:0.9em;"></div>

    <button id="deleteBtn">Delete All</button>

    
    <script src="renderer.js"></script>
</body>
</html>
